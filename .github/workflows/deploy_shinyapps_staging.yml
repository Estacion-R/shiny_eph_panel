name: Deploy a shinyapps.io (staging)

# Se dispara on-push al branch `staging`. Deploya a la app
# `shiny_eph_panel_staging` en la misma cuenta `estacionr` que prod.
# La versión staging tiene GA4 deshabilitado para no contaminar las
# métricas de producción con tráfico de testing.
on:
  push:
    branches: [staging]
    paths:
      - 'app.R'
      - 'ETL/**'
      - 'R/**'
      - 'www/**'
      - 'data_raw/**'
      - 'data_output/**'
      - 'init.R'
      - 'run.R'
      - '.rscignore'
      - '.github/workflows/deploy_shinyapps_staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-shinyapps-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: '4.5.3'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libharfbuzz-dev libfribidi-dev libudunits2-dev libgdal-dev libgeos-dev \
            libproj-dev

      - name: Cachear paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-deploy-${{ hashFiles('init.R') }}
          restore-keys: ${{ runner.os }}-r-deploy-

      - name: Instalar paquetes R
        run: |
          source("init.R")
          install.packages("rsconnect")
        shell: Rscript {0}

      - name: Configurar cuenta shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
        shell: Rscript {0}

      - name: Deploy staging
        run: |
          rsconnect::deployApp(
            appName        = "shiny_eph_panel_staging",
            account        = Sys.getenv("SHINYAPPS_NAME"),
            forceUpdate    = TRUE,
            launch.browser = FALSE,
            logLevel       = "normal"
          )
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
        shell: Rscript {0}

      - name: Notificar URL desplegada
        if: success()
        run: |
          echo "::notice title=Deploy staging exitoso::App desplegada en https://estacionr.shinyapps.io/shiny_eph_panel_staging/"
