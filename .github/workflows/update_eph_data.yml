name: Actualizar datos EPH

# Cron: corre el día 5 de cada mes a las 12:00 UTC (~9:00 ART).
# INDEC publica los microdatos de la EPH unos meses después del cierre
# del trimestre, así que un chequeo mensual es más que suficiente.
# También se puede disparar manualmente desde la pestaña Actions.
on:
  schedule:
    - cron: '0 12 5 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cachear paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-eph-update-${{ hashFiles('init.R') }}
          restore-keys: ${{ runner.os }}-r-eph-update-

      - name: Instalar paquetes R
        run: |
          install.packages(c("dplyr", "arrow", "eph", "glue", "purrr", "readr", "assertthat", "stringr", "testthat"))
        shell: Rscript {0}

      - name: Ejecutar script de actualización
        id: update
        run: Rscript ETL/03-update_data.R
        continue-on-error: false

      - name: Verificar si hay períodos nuevos
        id: check
        run: |
          if [ -s .new_periods.txt ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "Períodos nuevos:"
            cat .new_periods.txt
            {
              echo 'periods<<EOF'
              cat .new_periods.txt
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No hay períodos nuevos. Workflow termina sin cambios."
          fi

      ### Regenerar los parquets de runtime (issue #48). Sin estos
      ### pasos, los CSVs históricos quedan con el último trimestre
      ### pero panel_runtime.parquet (intertrim) y panel_runtime_anual
      ### .parquet siguen apuntando al trimestre viejo, generando un
      ### drift entre lo que muestra Foto vs el resto del dashboard.
      - name: Regenerar panel runtime intertrim
        if: steps.check.outputs.has_new == 'true'
        run: Rscript ETL/09-build_paneles_runtime.R

      - name: Regenerar panel runtime anual
        if: steps.check.outputs.has_new == 'true'
        run: Rscript ETL/09b-build_paneles_runtime_anual.R

      ### Gate de validación (issue #45). Si los parquets recién regenerados
      ### tienen drift de schema, gaps de cobertura, dúos con n anómalo o
      ### las tasas no coinciden con los CSVs históricos, abortamos antes
      ### de crear el PR. Evita propagar regresiones silenciosas a prod.
      - name: Validar parquets de runtime
        if: steps.check.outputs.has_new == 'true'
        run: Rscript ETL/12-validate_paneles_runtime.R

      - name: Limpiar archivo temporal antes del commit
        if: steps.check.outputs.has_new == 'true'
        run: rm -f .new_periods.txt

      - name: Crear Pull Request con datos actualizados
        id: cpr
        if: steps.check.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(data): actualizar EPH con nuevos períodos

            Períodos agregados:
            ${{ steps.check.outputs.periods }}
          title: '[auto] Actualización EPH: nuevos períodos disponibles'
          body: |
            ## Actualización automática de datos EPH

            El workflow detectó nuevos microdatos publicados por INDEC y
            ejecutó el script `ETL/03-update_data.R`. Este PR se mergea
            automáticamente y dispara el deploy a shinyapps.io.

            ### Períodos agregados
            ```
            ${{ steps.check.outputs.periods }}
            ```

            ### Archivos modificados
            - `data_raw/df_eph.parquet` (microdato bruto)
            - `data_output/df_tasas_mt.parquet` (totales por trimestre)
            - `data_output/panel_cond_act_historico.csv` (paneles para line chart)
            - `data_output/panel_runtime.parquet` + `.csv.gz` (runtime intertrim)
            - `data_output/panel_runtime_anual.parquet` + `.csv.gz` (runtime anual, issue #44)

            ---
            *Generado por `.github/workflows/update_eph_data.yml`*
          branch: auto/update-eph-data
          delete-branch: true
          add-paths: |
            data_raw/df_eph.parquet
            data_output/df_tasas_mt.parquet
            data_output/panel_cond_act_historico.csv
            data_output/panel_cat_ocup_historico.csv
            data_output/panel_formalidad_historico.csv
            data_output/panel_formalidad_ampliada_historico.csv
            data_output/tasas_cond_act_historico.csv
            data_output/tasas_cat_ocup_historico.csv
            data_output/tasas_formalidad_historico.csv
            data_output/tasas_formalidad_ampliada_historico.csv
            data_output/calidad_panel_pct_historico.csv
            data_output/panel_runtime.parquet
            data_output/panel_runtime.csv.gz
            data_output/panel_runtime_anual.parquet
            data_output/panel_runtime_anual.csv.gz

      - name: Auto-merge del PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --repo ${{ github.repository }} \
            --merge \
            --delete-branch
          echo "::notice title=PR mergeado::PR #${{ steps.cpr.outputs.pull-request-number }} mergeado automáticamente"

      ### -----------------------------------------------------------------
      ### Deploy en el mismo job para evitar tener que esperar el trigger
      ### de deploy_shinyapps.yml (los workflows triggereados por GITHUB_TOKEN
      ### no disparan otros workflows). Re-checkout porque el merge cambió master.
      ### -----------------------------------------------------------------

      - name: Re-checkout master post-merge
        if: steps.cpr.outputs.pull-request-number
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Instalar dependencias del sistema para Shiny
        if: steps.cpr.outputs.pull-request-number
        run: |
          sudo apt-get install -y libfontconfig1-dev libfreetype6-dev libpng-dev \
            libtiff5-dev libjpeg-dev libharfbuzz-dev libfribidi-dev \
            libudunits2-dev libgdal-dev libgeos-dev libproj-dev

      - name: Instalar paquetes para deploy
        if: steps.cpr.outputs.pull-request-number
        run: |
          source("init.R")
          install.packages("rsconnect")
        shell: Rscript {0}

      - name: Configurar y deployar a shinyapps.io
        if: steps.cpr.outputs.pull-request-number
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appName        = "shiny_eph_panel",
            account        = Sys.getenv("SHINYAPPS_NAME"),
            forceUpdate    = TRUE,
            launch.browser = FALSE,
            logLevel       = "normal"
          )
        shell: Rscript {0}

      - name: Notificar deploy exitoso
        if: steps.cpr.outputs.pull-request-number && success()
        run: |
          echo "::notice title=Ciclo completo OK::PR mergeado + deploy en https://estacionr.shinyapps.io/shiny_eph_panel/"
