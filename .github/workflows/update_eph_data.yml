name: Actualizar datos EPH

# Cron: corre el día 5 de cada mes a las 12:00 UTC (~9:00 ART).
# INDEC publica los microdatos de la EPH unos meses después del cierre
# del trimestre, así que un chequeo mensual es más que suficiente.
# También se puede disparar manualmente desde la pestaña Actions.
on:
  schedule:
    - cron: '0 12 5 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Cachear paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-eph-update-${{ hashFiles('init.R') }}
          restore-keys: ${{ runner.os }}-r-eph-update-

      - name: Instalar paquetes R
        run: |
          install.packages(c("dplyr", "arrow", "eph", "glue", "purrr", "readr", "assertthat", "stringr"))
        shell: Rscript {0}

      - name: Ejecutar script de actualización
        id: update
        run: Rscript ETL/03-update_data.R
        continue-on-error: false

      - name: Verificar si hay períodos nuevos
        id: check
        run: |
          if [ -s .new_periods.txt ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "Períodos nuevos:"
            cat .new_periods.txt
            {
              echo 'periods<<EOF'
              cat .new_periods.txt
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No hay períodos nuevos. Workflow termina sin cambios."
          fi

      - name: Limpiar archivo temporal antes del commit
        if: steps.check.outputs.has_new == 'true'
        run: rm -f .new_periods.txt

      - name: Crear Pull Request con datos actualizados
        if: steps.check.outputs.has_new == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(data): actualizar EPH con nuevos períodos

            Períodos agregados:
            ${{ steps.check.outputs.periods }}
          title: '[auto] Actualización EPH: nuevos períodos disponibles'
          body: |
            ## Actualización automática de datos EPH

            El workflow detectó nuevos microdatos publicados por INDEC y
            ejecutó el script `ETL/03-update_data.R`.

            ### Períodos agregados
            ```
            ${{ steps.check.outputs.periods }}
            ```

            ### Archivos modificados
            - `data_raw/df_eph.parquet` (microdato bruto)
            - `data_output/df_tasas_mt.parquet` (totales por trimestre)
            - `data_output/panel_cond_act_historico.csv` (paneles para line chart)

            ### Próximos pasos
            1. Revisar el diff (especialmente los nuevos períodos en el CSV histórico)
            2. Mergear el PR
            3. Re-deployar a shinyapps.io: `rsconnect::deployApp()`

            ---
            *Generado por `.github/workflows/update_eph_data.yml`*
          branch: auto/update-eph-data
          delete-branch: true
          add-paths: |
            data_raw/df_eph.parquet
            data_output/df_tasas_mt.parquet
            data_output/panel_cond_act_historico.csv
