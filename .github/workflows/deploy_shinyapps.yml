name: Deploy a shinyapps.io

# Se dispara automáticamente cuando se mergea un PR a master que afecta
# archivos relevantes para la app (código, datos, estilos, deps).
# Ignora cambios en docs y workflows porque no requieren redeploy.
on:
  push:
    branches: [master]
    paths:
      - 'app.R'
      - 'ETL/**'
      - 'R/**'
      - 'www/**'
      - 'data_raw/**'
      - 'data_output/**'
      - 'init.R'
      - 'run.R'
      - '.rscignore'
      - '.github/workflows/deploy_shinyapps.yml'
  workflow_dispatch:

# Evita que dos deploys corran en paralelo (cancela el anterior si llega push nuevo)
concurrency:
  group: deploy-shinyapps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Pin a 4.5 hasta que shinyapps.io soporte R 4.6 (release abr-2026).
          # Sin este pin, setup-r toma la última disponible (4.6) y el deploy
          # falla con "Unsupported R version 4.6.0 for operating system jammy".
          r-version: '4.5.3'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libharfbuzz-dev libfribidi-dev libudunits2-dev libgdal-dev libgeos-dev \
            libproj-dev

      - name: Cachear paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-deploy-${{ hashFiles('init.R') }}
          restore-keys: ${{ runner.os }}-r-deploy-

      - name: Instalar paquetes R
        run: |
          source("init.R")
          install.packages("rsconnect")
        shell: Rscript {0}

      - name: Configurar cuenta shinyapps.io
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          rsconnect::setAccountInfo(
            name   = Sys.getenv("SHINYAPPS_NAME"),
            token  = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
        shell: Rscript {0}

      - name: Deploy
        run: |
          rsconnect::deployApp(
            appName        = "shiny_eph_panel",
            account        = Sys.getenv("SHINYAPPS_NAME"),
            forceUpdate    = TRUE,
            launch.browser = FALSE,
            logLevel       = "normal"
          )
        env:
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
        shell: Rscript {0}

      - name: Notificar URL desplegada
        if: success()
        run: |
          echo "::notice title=Deploy exitoso::App desplegada en https://estacionr.shinyapps.io/shiny_eph_panel/"
